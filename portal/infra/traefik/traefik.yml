# Traefik Edge Server Configuration
# Deploy to: /etc/traefik/traefik.yml on 192.168.2.130
#
# This configuration enables:
# - HTTPS with automatic Let's Encrypt certificates (HTTP-01 challenge)
# - HTTP to HTTPS redirect
# - Dynamic configuration loading from /etc/traefik/dynamic/
# - Access logging and metrics

# API and Dashboard
api:
  dashboard: true
  # Secure the dashboard - enable only if needed, protected by middleware
  insecure: false

# Entry Points
entryPoints:
  # HTTP entry point - redirects to HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  
  # HTTPS entry point
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
    # Enable HTTP/2
    http2:
      maxConcurrentStreams: 250

# Certificate Resolvers
certificatesResolvers:
  letsencrypt:
    acme:
      # Email for Let's Encrypt notifications
      email: "${TRAEFIK_ACME_EMAIL:-admin@example.com}"
      # Certificate storage location
      storage: "/etc/traefik/acme.json"
      # HTTP-01 challenge
      httpChallenge:
        entryPoint: web
      # Use Let's Encrypt staging for testing (uncomment for production)
      # caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"

# Providers
providers:
  # File provider for dynamic configuration
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Logging
log:
  level: INFO
  # Log format: common, json
  format: json
  filePath: "/var/log/traefik/traefik.log"

# Access Log
accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  # Buffer for better performance
  bufferingSize: 100
  # Only log certain status codes
  filters:
    statusCodes:
      - "200-299"
      - "400-599"
    retryAttempts: true
    minDuration: "10ms"
  # Fields to include
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep
        X-Real-IP: keep

# Metrics (Prometheus)
# Uncomment to enable metrics endpoint
# metrics:
#   prometheus:
#     entryPoint: metrics
#     addEntryPointsLabels: true
#     addRoutersLabels: true
#     addServicesLabels: true

# Health check
ping:
  entryPoint: websecure

# Global settings
global:
  # Don't check for new versions
  checkNewVersion: false
  # Don't send anonymous usage statistics
  sendAnonymousUsage: false

# Server transport
serversTransport:
  # Disable SSL verification for backend servers (internal network)
  insecureSkipVerify: true
  # Maximum idle connections per host
  maxIdleConnsPerHost: 200
